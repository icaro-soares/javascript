<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex004</title>
</head>
<style>
    * {
        font-family: Arial, Helvetica, sans-serif;
    }
</style>
<body>
    <script>
        var nome = String(prompt('Digite seu nome'))
        var valor = Number(prompt('Digite um valor'))
        var sal = Number(prompt('Digite um valor que represente um salário'))
        var valor2 = Number(prompt('Agora digite outro valor'))
        alert('Olá, seja bem vindo(a) ' + nome + '!')
        document.write(`O salário digitado foi ${sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}<br>`)
        soma = valor + valor
        document.write(`Os valores digitados foram ${valor} e ${valor2}. A soma entre eles é ${soma}<br>`)
    </script>
</body>
</html>
