<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Valores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Valores</h1>
    </header>
    <section>
        <div>
            <p>
                Valor (entre 1 e 100):
                <input type="number" name="txn" id="txn">
                <input type="button" value="Analisar" onclick="analisar()">
            </p>
        </div>
        <div id=res>
            <select name="sel" id="isel" size="10">
                <option value="op1">Veja aqui o resultado</option>
            </select>
        </div>
    </section>
    <footer>
        <p>&copy; Curso em Vídeo</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
