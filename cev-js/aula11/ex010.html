<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex010</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        p {
            font-size: 13px;
        }
        input {
            width: 70px;
        }
    </style>
</head>
<body>
    <main>
        <h1>Sistema de Multas</h1>
        <div>
            <p>Velocidade do veículo <input type="number" name="txtvel" id="txtvel"> Km/H</p>
            <div><input type="button" value="Verificar" onclick="verificar()"></div>
        </div>
        <div id="res"></div>
        <script>
            function verificar() {
                var tvel = document.querySelector('input#txtvel')
                var vel = Number(tvel.value)
                var res = document.querySelector('div#res')
                res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}Km/H</strong></p>`
                if (vel > 60) {
                    res.innerHTML += `<p>Você foi <strong>MULTADO(A)</strong></p>`
                }
                res.innerHTML += '<p>Dirija sempre com segurança!</p>'
            }
        </script>
    </main>
</body>
</html>
