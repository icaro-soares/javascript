<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex009</title>
    <style>
        * {
            font-family: Arial;
        }
        input {
            margin: 0 .6em;
        }
    </style>
</head>
<body>
    <main>
        <h1>Nacionalidade</h1>
        <p>Digite o país que você nasceu: <input type="text" name="pais" id="country"><input type="button" value="Verificar" onclick="verificar()"></p>
        <p id="res"></p>
    </main>
    <script>
        function verificar() {
            var country = document.querySelector('input#country')
            var res = document.querySelector('p#res')
            res.innerHTML = `Parabéns você nasceu no(a) <strong>${country}</strong>`
        }
    </script>
</body>
</html>
