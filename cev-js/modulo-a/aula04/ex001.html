<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            width: 100vw;
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            background-color: black;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Olá mundo!</h1>
    <p>Me livrei da maldição...</p>
    <script>
        window.alert('Minha primeira mensagem!') //Popup de mensagem
        window.confirm('Está gostando do curso?') //Popup de escolha
        window.prompt('Qual é seu nome?') //Popup de interação
    </script>
</body>
</html>
