<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio tabuada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Desafio Tabuada</h1>
    </header>
    <section>
        <div id="dados">
            <p>
                Tabuada de:
                <input type="number" name="txtnum" id="txtnum">
                <input type="button" value="Gerar tabuada" onclick="gerar()">
            </p>
        </div>
        <div id="res">
            <select name="tabuada" id="tab" size="10">
                <option value="opt">Veja aqui sua tabuada</option>
            </select>
        </div>
    </section>
    <footer>
        <p>&copy; Curso em Vídeo</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
