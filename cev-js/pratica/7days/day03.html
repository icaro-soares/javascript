<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#7DaysOfCode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        header {
            color: white;
            background-color: black;
        }
        h1 {
            text-align: center;
            font-weight: bold;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>#7DaysOfCode</h1>
    </header>
    <div id="res">

    </div>
    <script>
        let res = document.getElementById('res')
        let car = prompt('Você quer seguir carreira no Front-End [1] ou no Back-End [2]?')
        
        if (car == 1) {
            alert('Você prefere Front-End')
            let c2 = prompt('E você prefere aprender React [1] ou Vue [2]?')
            if (c2 == 1) {
                alert('Você prefere aprender React!')
            } else if (c2 == 2) {
                alert('Você prefere aprender Vue')
            }
        } else if (car == 2) {
            alert('Você prefere Back-End')
            let c3 = prompt('E você prefere aprender C# [1] ou Java [2]')
            if (c3 == 1) {
                alert('Você prefere aprender C#')
            } else if (c3 == 2) {
                alert('Você prefe aprender Java')
            }
        }

        let espec = prompt('E você quer continuar se especializando na área [1] ou seguir se desenvolvendo para se tornar FullStack [2] ?')
        if (espec == 1) {
            alert('Você quer continuar se especializando na área')
        } else if (espec == 2) {
            alert('Você quer seguir se desenvolvendo para se tornar FullStack')
        }
    </script>
</body>
</html>
