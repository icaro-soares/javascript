<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex007</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        input {
            width: 70px;
        }
        div {
            margin-top: .3em;
        }
    </style>
</head>
<body>
    <h1>Somando números</h1>
    <input type="number" name="n1" id="in1"> +
    <input type="number" name="n2" id="in2">
    <input type="button" value="Somar" onclick="somar()">
    <div id="res">
        
    </div>
    <script>
        function somar () {
            var num1 = document.getElementById('in1')
            var num2 = document.getElementById('in2')
            var n1 = Number(num1.value)
            var n2 = Number(num2.value)
            var soma = n1 + n2
            res.innerText = `A soma entre ${n1} e ${n2} é ${soma}`
        }
    </script>
</body>
</html>
