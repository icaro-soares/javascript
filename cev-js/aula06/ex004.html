<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex004</title>
</head>
<style>
    * {
        font: normal 1em Arial, Helvetica, sans-serif;
    }
</style>
<body>
    <script>
        var nome = prompt('Qual seu nome?')
        var sal = Number(prompt('Digite seu salário'))
        document.write(`Seja bem vindo(a) ${nome}<br>`)
        document.write(`Seu nome tem ${nome.length} letras<br>`)
        document.write(`Este é seu nome escrito em letras MAIÚSCULAS: ${nome.toUpperCase()}<br>`)
        document.write(`Este é seu nome escrito em letras minúsculas: ${nome.toLowerCase()}<br>`)
        document.write(`Este é o valor digitado: ${sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`)
    </script>
</body>
</html>
