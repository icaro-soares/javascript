<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex004</title>
    <style>
        body {
            font: normal 1em Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <script>
        var nome = prompt('Qual seu nome?')
        var sal = Number(prompt('Qual seu salário?'))
        document.write(`Seu nome é <strong>${nome}</strong>, e tem ${nome.length} letras.<br>`)
        document.write(`Seu nome em letras maiúsculas ${nome.toUpperCase()}.<br>`)
        document.write(`Seu nome em letras minúsculas ${nome.toLowerCase()}.<br>`)
        document.write(`Seu salário é ${sal.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}`)

    </script>
</body>
</html>
